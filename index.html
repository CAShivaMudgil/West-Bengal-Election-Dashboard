<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>West Bengal Election Dashboard</title>\n    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">\n    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>\n</head>\n<body class="bg-gray-100">\n    <div class="container mx-auto my-5">\n        <h1 class="text-3xl font-bold text-center">West Bengal Election Dashboard</h1>\n        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-5">\n            <!-- Constituency Card Example -->\n            <div class="bg-white shadow-md rounded-lg p-5">\n                <h2 class="text-xl font-semibold">Constituency 1</h2>\n                <canvas id="chart1"></canvas>\n            </div>\n            <div class="bg-white shadow-md rounded-lg p-5">\n                <h2 class="text-xl font-semibold">Constituency 2</h2>\n                <canvas id="chart2"></canvas>\n            </div>\n            <!-- Add more constituency cards here -->\n        </div>\n    </div>\n    <script>\n    const ctx1 = document.getElementById('chart1').getContext('2d');\n    const chart1 = new Chart(ctx1, {\n        type: 'bar',\n        data: {\n            labels: ['Party A', 'Party B', 'Party C'],\n            datasets: [{\n                label: 'Votes',\n                data: [12, 19, 3],\n                backgroundColor: ['rgba(255, 99, 132, 0.2)', 'rgba(54, 162, 235, 0.2)', 'rgba(255, 206, 86, 0.2)'],\n                borderColor: ['rgba(255, 99, 132, 1)', 'rgba(54, 162, 235, 1)', 'rgba(255, 206, 86, 1)'],\n                borderWidth: 1\n            }]\n        },\n        options: {\n            scales: {\n                y: {\n                    beginAtZero: true\n                }\n            }\n        }\n    });\n    const ctx2 = document.getElementById('chart2').getContext('2d');\n    const chart2 = new Chart(ctx2, {\n        type: 'bar',\n        data: {\n            labels: ['Party A', 'Party B', 'Party C'],\n            datasets: [{\n                label: 'Votes',\n                data: [15, 10, 5],\n                backgroundColor: ['rgba(255, 99, 132, 0.2)', 'rgba(54, 162, 235, 0.2)', 'rgba(255, 206, 86, 0.2)'],\n                borderColor: ['rgba(255, 99, 132, 1)', 'rgba(54, 162, 235, 1)', 'rgba(255, 206, 86, 1)'],\n                borderWidth: 1\n            }]\n        },\n        options: {\n            scales: {\n                y: {\n                    beginAtZero: true\n                }\n            }\n        }\n    });\n    </script>\n</body>\n</html>\n
